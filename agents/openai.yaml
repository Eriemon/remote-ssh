interface:
  display_name: "Erie Remote SSH"
  short_description: "Conservative remote SSH for development/test workflows"
  default_prompt: "Use $erie-remote-ssh only when a development or testing task explicitly needs SSH or remote server work: discover/list/choices for servers, resolve same-host multi-account or multi-port targets, choose manual or guided configuration before server-list changes, add or update a server with mandatory software scan, run workspace-check to back up and write validation/workspace/software_scan state, refresh or query cached software availability including multi-version entries, review remote file or command requests, enforce upload_roots and sensitive local upload confirmation, troubleshoot SSH, or collect inventory."
