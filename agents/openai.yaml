interface:
  display_name: "Erie Remote SSH"
  short_description: "Conservative remote SSH for development/test workflows"
  default_prompt: "Use $erie-remote-ssh only when a development or testing task explicitly needs SSH or remote server work: discover/list/choices for servers, resolve same-host multi-account or multi-port targets, choose manual or guided configuration before server-list changes, run configure-key only after explicit guided choice for key-only passwordless repair, add servers through the grouped summary-confirmed wizard, update servers through numbered selection and field-menu edits with save confirmation, preserve metadata-only validation caches without forced scans, run mandatory software scans for enabled connection changes, run workspace-check to back up and write validation/workspace/software_scan state, keep Markdown UTF-8 canaries intact, refresh or query cached software availability including multi-version entries, review remote file or command requests under reports, preserve reports by default before skill updates, enforce upload_roots and sensitive local upload confirmation, troubleshoot SSH, or collect inventory."
